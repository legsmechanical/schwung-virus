<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Osirus Editor</title>
<style>
  /* Access Virus cue: graphite metal panel, wooden end-cheeks, black/red LCD
     header, red knob pointers + LED accents. Blocks are absolute-positioned per
     the custom layout (tools/osiruslayout.json) and the whole canvas is scaled
     to the iframe width. */
  :root{
    --metal1:#41454b; --metal2:#33363b; --metal3:#2a2c30;
    --recess:#212327; --recess2:#191b1e; --edge:#15161a; --hair:rgba(255,255,255,.05);
    --ink:#eceef1; --dim:#9b9fa6; --label:#c6c9cf;
    --red:#d8362b; --red2:#ff5347; --knob1:#2c2e33; --knob2:#0c0d10; --track:#16181b; --r:5px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{background:var(--metal3);color:var(--ink);
    font:12px/1.3 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;-webkit-user-select:none;user-select:none}
  body::before,body::after{content:"";position:fixed;top:0;bottom:0;width:13px;z-index:40;pointer-events:none}
  body::before{left:0;background:linear-gradient(90deg,#1c1208,#8a5a2e 45%,#5e3c1c)}
  body::after{right:0;background:linear-gradient(270deg,#1c1208,#8a5a2e 45%,#5e3c1c)}
  #app{min-height:100%;margin:0 13px;
    background:repeating-linear-gradient(180deg,rgba(255,255,255,.016) 0 1px,transparent 1px 3px),
      linear-gradient(180deg,var(--metal1),var(--metal2));
    box-shadow:inset 0 0 0 1px rgba(0,0,0,.4)}
  .hidden{display:none!important}

  /* header */
  header{position:sticky;top:0;z-index:30;display:flex;flex-wrap:wrap;gap:8px 12px;align-items:center;
    padding:7px 12px;background:linear-gradient(180deg,#101113,#0a0b0c);border-bottom:1px solid #000}
  .brand{font-weight:800;letter-spacing:2.5px;color:var(--red);font-size:14px;text-shadow:0 0 10px rgba(216,54,43,.4)}
  .brand small{color:#6a6d73;font-weight:600;letter-spacing:.5px;font-size:9px;margin-left:5px}
  .badge{font-size:10px;font-weight:800;color:#1a0c0a;background:var(--red);border-radius:3px;padding:2px 7px;box-shadow:0 0 8px rgba(216,54,43,.5)}
  .lcd{display:flex;align-items:center;gap:6px;background:linear-gradient(180deg,#2a0907,#1a0605);
    border:1px solid #000;border-radius:4px;padding:4px 8px;box-shadow:inset 0 0 10px rgba(216,54,43,.25),0 1px 0 rgba(255,255,255,.05)}
  .lcd .name{min-width:140px;max-width:220px;text-align:center;color:#ff7a6e;font-weight:700;
    font-family:"SF Mono",ui-monospace,Menlo,monospace;letter-spacing:.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-shadow:0 0 6px rgba(255,90,71,.6)}
  .lcd .idx{font-variant-numeric:tabular-nums;color:#c5483f;min-width:52px;text-align:center;font-size:11px}
  .lcd .bank{color:#9c473f;font-size:10px;letter-spacing:.5px;min-width:58px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .grp{display:flex;align-items:center;gap:5px}
  .hl{font-size:9px;text-transform:uppercase;letter-spacing:.8px;color:#6a6d73}
  button.nav{background:linear-gradient(180deg,#2b2d31,#1a1c1f);border:1px solid #000;color:var(--ink);
    border-radius:4px;padding:4px 9px;cursor:pointer;font-size:13px;box-shadow:0 1px 0 rgba(255,255,255,.06)}
  button.nav:hover{border-color:var(--red);color:#fff}
  button.nav:active{background:#141517}
  #status{margin-left:auto;font-size:10px;color:#6a6d73;display:flex;align-items:center;gap:6px}
  #dot{width:8px;height:8px;border-radius:50%;background:#3a1411}
  #dot.ok{background:var(--red2);box-shadow:0 0 7px rgba(255,83,71,.8)} #dot.err{background:#ffd23a}

  /* jump-link bar */
  .tabs{position:sticky;top:42px;z-index:25;display:flex;flex-wrap:wrap;gap:3px;padding:5px 12px;
    background:linear-gradient(180deg,#1a1c1f,#141518);border-bottom:1px solid #000}
  .tab{padding:4px 14px;border-radius:3px;cursor:pointer;font-weight:700;font-size:11px;letter-spacing:1px;
    color:var(--dim);border:1px solid transparent;text-transform:uppercase}
  .tab:hover{color:var(--ink)}
  .tab.sel{color:#1a0c0a;background:linear-gradient(180deg,var(--red2),var(--red));border-color:#000;box-shadow:0 0 9px rgba(216,54,43,.45)}

  /* scaled canvas of absolute blocks */
  main{padding:0;overflow-x:auto}
  .pagewrap{position:relative;overflow:hidden}
  .canvas{position:absolute;top:0;left:0;transform-origin:top left}
  .block{position:absolute;background:linear-gradient(180deg,var(--recess),var(--recess2));
    border:1px solid var(--edge);border-radius:var(--r);padding:0 8px 0;
    box-shadow:inset 0 1px 0 var(--hair),0 2px 6px rgba(0,0,0,.5)}
  .bhead{display:flex;align-items:center;gap:6px;margin:0 -8px 4px;padding:5px 8px;
    background:linear-gradient(180deg,#222530,#191c24);border-bottom:1px solid #000;border-radius:var(--r) var(--r) 0 0}
  .bhead .t{font-size:9.5px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--label);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .bhead .led{width:5px;height:5px;border-radius:50%;background:var(--red);box-shadow:0 0 5px rgba(216,54,43,.7);flex:none}

  .controls{position:relative}
  .ctl{position:absolute;display:flex;flex-direction:column;align-items:center;gap:1px;transition:opacity .12s ease}
  .ctl.pkdim{opacity:.3}   /* osc wave-select / pulse-width sidelined by current Shape zone */
  .ctl > label{font-size:8.5px;color:var(--dim);text-align:center;line-height:1.1;height:18px;
    overflow:hidden;display:flex;align-items:flex-end;justify-content:center;width:100%}
  .ctl .val{font-size:9px;color:var(--ink);min-height:10px;font-variant-numeric:tabular-nums}
  .knobsvg{width:40px;height:40px;display:block;margin:-3px 0 -6px;cursor:ns-resize;touch-action:none}
  .kbody{fill:url(#kgrad);stroke:#000;stroke-width:1}
  .karc{fill:none;stroke:var(--track);stroke-width:3;stroke-linecap:round}
  .kfill{fill:none;stroke:var(--red);stroke-width:3;stroke-linecap:round;filter:drop-shadow(0 0 2px rgba(216,54,43,.6))}
  .kptr{stroke:var(--red2);stroke-width:2.2;stroke-linecap:round}
  .ctl.sel select{width:104px;height:24px;background:linear-gradient(180deg,#26282c,#1a1c1f);border:1px solid #000;border-radius:4px;
    color:var(--ink);font-size:10px;padding:0 5px;cursor:pointer}
  .ctl.sel select:hover{border-color:var(--red)}
  .sw{width:42px;height:22px;border-radius:11px;background:var(--track);border:1px solid #000;position:relative;cursor:pointer;transition:background .12s}
  .sw .dot{position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#54585f;transition:.12s}
  .sw.on{background:rgba(216,54,43,.32)}
  .sw.on .dot{left:22px;background:var(--red2);box-shadow:0 0 7px rgba(255,83,71,.8)}
  .divider{position:absolute;z-index:6;border-radius:1px}
  .divider.dv{background:linear-gradient(90deg,rgba(0,0,0,.6),rgba(255,255,255,.08))}
  .divider.dh{background:linear-gradient(180deg,rgba(0,0,0,.6),rgba(255,255,255,.08))}

  footer{padding:10px 12px 18px;color:#6a6d73;font-size:9.5px;text-align:center;letter-spacing:.5px}
</style>
</head>

<svg width="0" height="0" style="position:absolute"><defs>
  <radialGradient id="kgrad" cx="38%" cy="30%" r="75%"><stop offset="0%" stop-color="#3a3d43"/><stop offset="55%" stop-color="#2c2e33"/><stop offset="100%" stop-color="#0c0d10"/></radialGradient>
</defs></svg>
<div id="app">
  <header>
    <div class="brand">OSIRUS<small>SCHWUNG EDITOR</small></div>
    <span id="modelBadge" class="badge">A</span>
    <div class="lcd">
      <button class="nav" id="bPrev" title="Prev bank">«</button>
      <span class="bank" id="bName">—</span>
      <button class="nav" id="bNext" title="Next bank">»</button>
      <button class="nav" id="pPrev" title="Prev patch">‹</button>
      <span class="name" id="pName">—</span>
      <span class="idx" id="pIdx"></span>
      <button class="nav" id="pNext" title="Next patch">›</button>
    </div>
    <div class="grp"><span class="hl">Oct</span>
      <button class="nav" id="oDown">−</button><span class="idx" id="oVal" style="color:var(--dim);min-width:26px;text-align:center">0</span><button class="nav" id="oUp">+</button></div>
    <div class="grp"><span class="hl">Zoom</span>
      <input id="zoom" type="range" min="0.5" max="2" step="0.05" value="1" style="width:90px"></div>
    <button class="nav" id="syncBtn" title="Re-sync from device">⟳ Sync</button>
    <div id="status"><span id="dot"></span><span id="statusText">connecting…</span></div>
  </header>
  <nav class="tabs" id="tabs"></nav>
  <main id="main"></main>
  <footer>OSIRUS · Access Virus emulator (Gearmulator) · monotimbral single-patch editor</footer>
</div>

<script>
(function(){
  "use strict";
  var PREFIX = "synth:";
  var _pm=(location.search.match(/[?&]model=([abcABC])/)||[])[1];
  var remote = window.schwungRemote || {
    _v:_pm?{"synth:rom_model":_pm.toUpperCase()}:{},
    getParam:function(k){ return Promise.resolve(this._v[k]); },
    setParam:function(k,v){ this._v[k]=String(v); },
    onParamChange:function(){}, getHierarchy:function(){return Promise.resolve(null);}, getChainParams:function(){return Promise.resolve(null);}
  };

  var DESIGN_W=(LAYOUT.canvasWidth)||1130;
  var CW=(LAYOUT.cell&&LAYOUT.cell.w)||56, RH=(LAYOUT.cell&&LAYOUT.cell.h)||68;
  var BANDS=[{id:"osc",name:"Oscillators · Mixer · Filter · Envelopes"},{id:"lfo",name:"LFOs · Modulation Matrix"},{id:"fx",name:"Effects"},{id:"arp",name:"Arpeggiator · Patch"}];

  var state={ values:{}, level:0, built:false, canvas:null, wrap:null, designH:0, bandFirst:{} };
  var controls={};   // key -> [setter,...]

  function num(x){ var n=parseFloat(x); return isNaN(n)?0:n; }
  function el(t,c,x){ var e=document.createElement(t); if(c)e.className=c; if(x!=null)e.textContent=x; return e; }
  function setParam(key,v){ state.values[key]=String(v); remote.setParam(PREFIX+key,String(v));
    var a=controls[key]; if(a) for(var i=0;i<a.length;i++){ try{a[i](v);}catch(e){} } }   // fire listeners (e.g. Shape→dim reactivity) on local edits
  function onValue(key,fn){ (controls[key]||(controls[key]=[])).push(fn); }
  function pushValue(key,v){ state.values[key]=String(v); var a=controls[key]; if(a) for(var i=0;i<a.length;i++){ try{a[i](v);}catch(e){} } }
  function isOffOn(o){ return o.length===2 && /off/i.test(o[0]) && /on/i.test(o[1]); }

  // label de-dup (matches the arranger) + per-key overrides
  function stripFor(title){ var m;
    if(m=title.match(/^Osc (\d)/)) return m[1]==="2"?["Osc2","Osc"]:["Osc"+m[1]];
    if(m=title.match(/^LFO (\d)/)) return ["LFO"+m[1]];
    if(m=title.match(/^Filter (\d)/)) return ["Filt"+m[1],"Flt"+m[1]];
    if(title==="Unison") return ["Unison"];
    if(title==="Filter Routing") return ["Filter","Filt","Flt"];
    if(title==="Filter Envelope") return ["Flt"];
    if(title==="Amp Envelope") return ["Amp"];
    if(title==="Velocity Mod") return ["Velocity","Vel"];
    if(title==="Chorus"||title==="Phaser") return [title];
    if(title.indexOf("Delay")===0) return ["Delay"];
    if(title==="EQ") return ["EQ"];
    if(title==="Distortion") return ["Dist"];
    if(title==="Arpeggiator") return ["Arp"];
    return [];
  }
  function shortName(name,strip){ if(!strip||!strip.length) return name; var s=name;
    strip.forEach(function(t){ s=s.replace(new RegExp("\\b"+t.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+"\\b","ig")," "); });
    s=s.replace(/\s+/g," ").trim(); return s||name; }
  var LABELS={ osc2_filt_env_amt:"Env→Pitch", fm_filt_env_amt:"Env→FM" };

  // ---- live widgets (native ints) ----
  var NS="http://www.w3.org/2000/svg";
  function polar(cx,cy,r,deg){ var a=deg*Math.PI/180; return [cx+r*Math.sin(a), cy-r*Math.cos(a)]; }
  function arc(r,fromDeg,toDeg){ var a=polar(20,20,r,fromDeg), b=polar(20,20,r,toDeg), large=(toDeg-fromDeg)>180?1:0;
    return "M"+a[0].toFixed(2)+","+a[1].toFixed(2)+" A"+r+","+r+" 0 "+large+" 1 "+b[0].toFixed(2)+","+b[1].toFixed(2); }
  function lbl(nm,full){ var l=el("label",null,nm); l.title=full||nm; return l; }
  function makeKnob(key,m,nm){
    var min=num(m.min), max=num(m.max); if(max<=min) max=min+1;
    var bip=!!BIPOLAR[key], center=64, signed=bip||min<0;
    var degC=bip ? (-135+(center-min)/(max-min)*270) : -135;  // fill origin: center for bipolar, min otherwise
    var wrap=el("div","ctl"); wrap.appendChild(lbl(nm,m.name));
    var svg=document.createElementNS(NS,"svg"); svg.setAttribute("viewBox","0 0 40 40"); svg.setAttribute("class","knobsvg");
    var body=document.createElementNS(NS,"circle"); body.setAttribute("cx",20); body.setAttribute("cy",20); body.setAttribute("r",14); body.setAttribute("class","kbody"); svg.appendChild(body);
    var trk=document.createElementNS(NS,"path"); trk.setAttribute("class","karc"); trk.setAttribute("d",arc(13,-135,135)); svg.appendChild(trk);
    var fill=document.createElementNS(NS,"path"); fill.setAttribute("class","kfill"); svg.appendChild(fill);
    var ptr=document.createElementNS(NS,"line"); ptr.setAttribute("class","kptr"); ptr.setAttribute("x1",20); ptr.setAttribute("y1",20); svg.appendChild(ptr);
    wrap.appendChild(svg); var val=el("span","val"); wrap.appendChild(val);
    function draw(v){ v=Math.max(min,Math.min(max,v)); var frac=(v-min)/(max-min), deg=-135+frac*270, pe=polar(20,20,13,deg);
      ptr.setAttribute("x2",pe[0].toFixed(2)); ptr.setAttribute("y2",pe[1].toFixed(2));
      fill.setAttribute("d", bip ? arc(13,Math.min(deg,degC),Math.max(deg,degC)) : arc(13,-135,deg));
      var disp=bip ? Math.round(v)-center : Math.round(v);
      val.textContent=(signed&&disp>0?"+":"")+disp; }
    function cur(){ return num(state.values[key]!==undefined?state.values[key]:min); }
    onValue(key,function(v){ draw(num(v)); });
    var dragging=false,sy=0,sv=0;
    function down(e){ dragging=true; sy=(e.touches?e.touches[0].clientY:e.clientY); sv=cur();
      window.addEventListener("mousemove",move); window.addEventListener("touchmove",move,{passive:false});
      window.addEventListener("mouseup",up); window.addEventListener("touchend",up); e.preventDefault(); }
    function move(e){ if(!dragging)return; var y=(e.touches?e.touches[0].clientY:e.clientY);
      var nv=Math.round(sv+(sy-y)*(max-min)/(e.shiftKey?900:150)); nv=Math.max(min,Math.min(max,nv)); setParam(key,nv); draw(nv); e.preventDefault(); }
    function up(){ dragging=false; window.removeEventListener("mousemove",move); window.removeEventListener("touchmove",move); window.removeEventListener("mouseup",up); window.removeEventListener("touchend",up); }
    svg.addEventListener("mousedown",down); svg.addEventListener("touchstart",down,{passive:false});
    svg.addEventListener("wheel",function(e){ var nv=Math.max(min,Math.min(max,cur()+(e.deltaY<0?1:-1))); setParam(key,nv); draw(nv); e.preventDefault(); },{passive:false});
    draw(cur()); return wrap;
  }
  function makeSelect(key,m,opts,nm){
    var wrap=el("div","ctl sel"); wrap.appendChild(lbl(nm,m.name));
    var sel=el("select"); opts.forEach(function(o,i){ var op=el("option",null,o); op.value=i; sel.appendChild(op); });
    sel.onchange=function(){ setParam(key,sel.value); };
    onValue(key,function(v){ sel.value=String(num(v)); });
    sel.value=String(num(state.values[key]||0)); wrap.appendChild(sel); return wrap;
  }
  function makeToggle(key,m,opts,nm){
    var wrap=el("div","ctl"); wrap.appendChild(lbl(nm,m.name));
    var sw=el("div","sw"); sw.appendChild(el("div","dot")); var val=el("span","val");
    function draw(v){ var on=num(v)>=1; sw.classList.toggle("on",on); val.textContent=on?opts[1]:opts[0]; }
    sw.onclick=function(){ var on=!sw.classList.contains("on"); setParam(key,on?1:0); draw(on?1:0); };
    onValue(key,function(v){ draw(v); });
    wrap.appendChild(sw); wrap.appendChild(val); draw(state.values[key]||0); return wrap;
  }
  function makeControl(key,strip){
    var m=PARAMS[key]; if(!m){ console.warn("unknown param",key); return null; }
    if(m.model>state.level) return null;
    var nm=LABELS[key]||shortName(m.name,strip);
    var node = m.opts ? (isOffOn(OPTS[m.opts]||[]) ? makeToggle(key,m,OPTS[m.opts]||[],nm) : makeSelect(key,m,OPTS[m.opts]||[],nm))
                      : makeKnob(key,m,nm);
    if(node) node.setAttribute("data-pk",key);
    return node;
  }
  function makeDividerEl(d){ var e=el("div","divider "+(d.orient==="h"?"dh":"dv"));
    if(d.orient==="v") e.style.cssText="position:absolute;left:"+(d.pos*CW-1.5)+"px;top:"+(d.start*RH)+"px;height:"+((d.end-d.start)*RH)+"px;width:3px";
    else e.style.cssText="position:absolute;top:"+(d.pos*RH-1.5)+"px;left:"+(d.start*CW)+"px;width:"+((d.end-d.start)*CW)+"px;height:3px";
    return e; }

  // ---- build the scaled canvas of absolute blocks ----
  function build(){
    if(state.built) return; state.built=true;
    var main=document.getElementById("main"), tabs=document.getElementById("tabs");
    var wrap=el("div","pagewrap"); var canvas=el("div","canvas"); canvas.style.width=DESIGN_W+"px";
    state.canvas=canvas; state.wrap=wrap; state.bandFirst={};
    LAYOUT.blocks.forEach(function(block){
      var strip=stripFor(block.title), nodes=[], any=false, maxR=0, maxC=0;
      (block.controls||[]).forEach(function(c){
        var node=makeControl(c.key,strip); if(!node) return; any=true;
        node.style.left=(c.col*CW)+"px"; node.style.top=(c.row*RH)+"px"; node.style.width=(c.span*CW-4)+"px";
        nodes.push(node); if(c.row+1>maxR)maxR=c.row+1; if(c.col+c.span>maxC)maxC=c.col+c.span;
      });
      if(!any) return;                                  // fully model-gated → skip block
      var card=el("div","block"); card.style.left=block.x+"px"; card.style.top=block.y+"px";
      var head=el("div","bhead"); head.appendChild(el("span","led")); head.appendChild(el("span","t",block.title)); card.appendChild(head);
      var bodyEl=el("div","controls");
      bodyEl.style.width=Math.max(maxC*CW, block.w||0)+"px"; bodyEl.style.height=Math.max(maxR*RH, block.h||0)+"px";
      nodes.forEach(function(n){ bodyEl.appendChild(n); });
      (block.dividers||[]).forEach(function(d){ bodyEl.appendChild(makeDividerEl(d)); });
      card.appendChild(bodyEl); canvas.appendChild(card);
      var bf=state.bandFirst[block.band];
      if(!bf || block.y<bf.y) state.bandFirst[block.band]={y:block.y, card:card};
    });
    wrap.appendChild(canvas); main.appendChild(wrap);
    BANDS.forEach(function(b,i){ if(!state.bandFirst[b.id]) return;
      var t=el("div","tab",b.id.toUpperCase()); t.id="tab"+i;
      t.onclick=function(){ var f=state.bandFirst[b.id]; if(f) f.card.scrollIntoView({behavior:"smooth",block:"start"}); };
      tabs.appendChild(t); });
    // native canvas extent = lowest/rightmost block edges (blocks can sit past the
    // nominal design width, so scale to whatever actually fits)
    var maxB=0, maxR=0, ch=canvas.children;
    for(var i=0;i<ch.length;i++){ var c=ch[i]; var bb=c.offsetTop+c.offsetHeight; if(bb>maxB)maxB=bb; var rr=c.offsetLeft+c.offsetWidth; if(rr>maxR)maxR=rr; }
    state.designW=maxR+8; canvas.style.width=state.designW+"px";   // fit actual content width (zoom to fill)
    canvas.style.height=(maxB+12)+"px"; state.designH=maxB+12;
    setupOscShapeDim();
    relayout(); setupScrollSpy();
  }
  // The Virus osc Shape knob crossfades [Wave Select] → Saw → [Pulse Width]:
  // Wave Select is silent when Shape >= 64, Pulse Width is silent when Shape < 64.
  // Dim whichever is currently sidelined so it's visually clear what's active.
  function setupOscShapeDim(){
    [1,2].forEach(function(n){
      var shapeKey="osc"+n+"_shape";
      var waveEl=state.canvas.querySelector('[data-pk="osc'+n+'_wave_select"]');
      var pwEl=state.canvas.querySelector('[data-pk="osc'+n+'_pulsewidth"]');
      if(!waveEl && !pwEl) return;
      function apply(sv){ var pulse=sv>=64;
        if(waveEl) waveEl.classList.toggle("pkdim", pulse);
        if(pwEl)   pwEl.classList.toggle("pkdim", !pulse); }
      onValue(shapeKey,function(v){ apply(num(v)); });
      apply(num(state.values[shapeKey]||0));
    });
  }
  function relayout(){
    if(!state.canvas) return;
    var avail=document.getElementById("main").clientWidth-2;
    var z=parseFloat((document.getElementById("zoom")||{}).value)||1;   // header zoom slider
    var S=avail/(state.designW||DESIGN_W)*z;
    state.canvas.style.transform="scale("+S+")";
    state.wrap.style.width=(state.designW*S)+"px";   // so >100% zoom scrolls horizontally
    state.wrap.style.height=(state.designH*S)+"px";
  }
  var rT; window.addEventListener("resize",function(){ clearTimeout(rT); rT=setTimeout(relayout,120); });
  document.getElementById("zoom").oninput=relayout;
  function setupScrollSpy(){
    if(!window.IntersectionObserver) return;
    var io=new IntersectionObserver(function(es){ es.forEach(function(e){ if(!e.isIntersecting) return;
      var id=e.target.getAttribute("data-band");
      BANDS.forEach(function(b,j){ var t=document.getElementById("tab"+j); if(t) t.classList.toggle("sel",b.id===id); }); }); },{rootMargin:"-90px 0px -75% 0px"});
    BANDS.forEach(function(b){ var f=state.bandFirst[b.id]; if(f){ f.card.setAttribute("data-band",b.id); io.observe(f.card); } });
  }

  // ---- preset / bank / octave ----
  function refreshBrowser(){
    document.getElementById("pName").textContent=state.values["preset_name"]||"—";
    var idx=num(state.values["patch_in_bank"]), cnt=num(state.values["preset_count"]);
    document.getElementById("pIdx").textContent=cnt?idx+"/"+cnt:"";
    document.getElementById("bName").textContent=state.values["bank_name"]||"—";
    var o=num(state.values["octave_transpose"]); document.getElementById("oVal").textContent=(o>0?"+":"")+o;
  }
  // Preset/bank loads are applied ASYNC by the Virus's forked DSP child; the
  // module's get_param("state") blocks until the child confirms the sync, so the
  // manager's re-push already returns the new patch's values — no UI retry needed.
  function stepPreset(d){ var i=num(state.values["preset"]), c=num(state.values["preset_count"])||1; i=(i+d+c)%c; setParam("preset",i); state.lastPreset=String(i); refreshBrowser(); }
  function stepBank(d){ var i=num(state.values["bank_index"]), c=num(state.values["bank_count"])||1; i=(i+d+c)%c; setParam("bank_index",i); }
  function stepOctave(d){ var o=Math.max(-4,Math.min(4,num(state.values["octave_transpose"])+d)); setParam("octave_transpose",o); refreshBrowser(); }

  function applyParamUpdate(params){ if(!params) return; var b=false;
    Object.keys(params).forEach(function(fk){ var key=fk.indexOf(PREFIX)===0?fk.slice(PREFIX.length):fk; pushValue(key,params[fk]);
      if(/^(preset|preset_name|preset_count|patch_in_bank|bank_index|bank_name|octave_transpose|rom_model)$/.test(key)) b=true;
      if(key==="preset"){ var p=String(params[fk]); if(p!==state.lastPreset){ state.lastPreset=p; } }
      if(key==="rom_model") maybeRebuildForModel(params[fk]); });
    if(b) refreshBrowser();
  }
  function maybeRebuildForModel(name){ var lvl=/^c/i.test(name)?2:/^b/i.test(name)?1:0;
    document.getElementById("modelBadge").textContent=name&&name!=="?"?String(name).toUpperCase():"—";
    if(lvl!==state.level && state.built){ state.level=lvl; rebuild(); } else state.level=lvl; }
  function rebuild(){ controls={}; state.built=false; document.getElementById("main").innerHTML=""; document.getElementById("tabs").innerHTML=""; build(); seedValues(); }
  function setStatus(t,c){ document.getElementById("statusText").textContent=t; document.getElementById("dot").className=c||""; }
  function resync(){ try{ window.parent.postMessage({type:"subscribe"},"*"); }catch(e){} if(state.built) seedValues(); }

  function seedValues(){
    ["rom_model","preset","preset_name","preset_count","patch_in_bank","bank_index","bank_name","bank_count","octave_transpose"].forEach(function(k){
      remote.getParam(PREFIX+k).then(function(v){ if(v!=null&&v!==""){ if(k==="rom_model")maybeRebuildForModel(v); else state.values[k]=String(v); refreshBrowser(); } }); });
    var keys=Object.keys(controls), i=0;
    (function next(){ var n=0; while(i<keys.length&&n<24){ (function(k){ remote.getParam(PREFIX+k).then(function(v){ if(v!=null&&v!=="") pushValue(k,v); }); })(keys[i++]); n++; } if(i<keys.length) setTimeout(next,18); })();
  }

  document.getElementById("pPrev").onclick=function(){ stepPreset(-1); };
  document.getElementById("pNext").onclick=function(){ stepPreset(1); };
  document.getElementById("bPrev").onclick=function(){ stepBank(-1); };
  document.getElementById("bNext").onclick=function(){ stepBank(1); };
  document.getElementById("oDown").onclick=function(){ stepOctave(-1); };
  document.getElementById("oUp").onclick=function(){ stepOctave(1); };
  document.getElementById("syncBtn").onclick=function(){ resync(); setStatus("synced","ok"); };

  setStatus("connecting…","");
  remote.onParamChange(applyParamUpdate);
  remote.getParam(PREFIX+"rom_model").then(function(v){ maybeRebuildForModel(v||"A"); build(); setStatus("connected","ok"); seedValues(); });
})();
</script>
</body>
</html>
