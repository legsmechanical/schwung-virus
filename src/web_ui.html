<style>

  :root{

  body::after{right:0;background:linear-gradient(270deg,var(--cheek2),var(--cheek1) 45%,var(--cheek2))}
  .mono{font-variant-numeric:tabular-nums;font-family:ui-monospace,"SF Mono",Menlo,monospace}

  /* top bar */
  .top{position:sticky;top:0;z-index:60;background:var(--chrome);border-bottom:1px solid rgba(0,0,0,.18);backdrop-filter:blur(9px)}
  .topin{max-width:980px;margin:0 auto;display:flex;align-items:center;gap:16px;height:54px;padding:0 26px}
  .brand{display:flex;align-items:baseline;gap:7px;flex:none}
  .brand b{font-size:15px;font-weight:800;letter-spacing:4px;color:var(--chromeink)}
  .brand b i{font-style:normal;color:var(--acc)}
  .brand .mn{font-size:8px;font-weight:700;letter-spacing:1.6px;color:var(--chromemut);text-transform:uppercase;white-space:nowrap}
  .seg{display:flex;gap:2px;background:var(--surf);border:1px solid rgba(0,0,0,.28);border-radius:9px;padding:3px;flex:none}
  .seg button{appearance:none;border:0;background:transparent;color:var(--mut);font-family:inherit;font-weight:700;font-size:11.5px;
    letter-spacing:1px;padding:5px 12px;border-radius:6px;cursor:pointer}
  .seg button:hover{color:var(--ink)}
  .seg button.on{color:#fff;background:var(--acc);box-shadow:0 1px 8px color-mix(in srgb,var(--acc) 40%,transparent)}
  .pr{flex:1;min-width:0;display:flex;align-items:center;gap:11px;padding:0 4px}
  .pr .dot{width:7px;height:7px;border-radius:50%;background:var(--led);box-shadow:0 0 9px var(--led);flex:none}
  .lcd{flex:1;min-width:0;display:flex;align-items:center;gap:10px;height:32px;padding:0 12px;border-radius:6px;
    background:var(--lcdbg);border:1px solid var(--lcdframe);box-shadow:inset 0 1px 5px rgba(0,0,0,.45),inset 0 1px 0 rgba(255,255,255,.12);
    font-family:ui-monospace,Menlo,monospace}
  .lcd .pn{flex:1;min-width:0;font-size:12.5px;font-weight:700;color:var(--lcdink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.3px}
  .lcd .pm{font-size:10px;color:var(--lcdink);opacity:.82;white-space:nowrap;letter-spacing:.5px}
  .pr .hb{appearance:none;border:1px solid rgba(0,0,0,.28);background:var(--surf);color:var(--mut);width:23px;height:23px;border-radius:6px;cursor:pointer;font-size:12px;line-height:1;flex:none}
  .pr .hb:hover{color:var(--ink)}
  .oct{display:flex;align-items:center;gap:6px;flex:none}
  .oct .l{font-size:9px;letter-spacing:1.4px;color:var(--chromemut);text-transform:uppercase}
  .oct .hb{appearance:none;border:1px solid rgba(0,0,0,.28);background:var(--surf);color:var(--mut);width:22px;height:22px;border-radius:6px;cursor:pointer;font-size:13px;line-height:1}
  .oct .hb:hover{color:var(--ink)}
  .oct .ov{font-size:12px;min-width:16px;text-align:center;color:var(--chromeink)}
  .sync{display:flex;align-items:center;gap:7px;flex:none;border:1px solid rgba(0,0,0,.28);background:var(--surf);color:var(--ink);
    border-radius:7px;padding:7px 13px;cursor:pointer;font-family:inherit;font-weight:700;font-size:10px;letter-spacing:1.3px;text-transform:uppercase}
  .sync .d{width:6px;height:6px;border-radius:50%;background:var(--led);box-shadow:0 0 7px var(--led);flex:none}
  .sync:hover{border-color:var(--acc);color:#fff}
  .sync:active{transform:translateY(1px)}
  .sync.syncing{border-color:var(--acc);color:#fff}
  .sync.syncing .d{animation:syncblink .25s steps(2,end) infinite}
  @keyframes syncblink{0%{opacity:1}100%{opacity:.2}}

  /* horizontal section nav */
  .tabs{position:sticky;top:54px;z-index:40;background:var(--chrome);border-bottom:1px solid rgba(0,0,0,.18);backdrop-filter:blur(9px)}
  .tabsin{max-width:980px;margin:0 auto;display:flex;flex-wrap:wrap;gap:3px;padding:6px 26px}
  .tabs a{display:flex;align-items:center;gap:7px;padding:5px 11px;color:var(--chromemut);text-decoration:none;cursor:pointer;
    font-size:10px;font-weight:700;letter-spacing:.9px;text-transform:uppercase;border-radius:7px;border:1px solid transparent}
  .tabs a .d{width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.4;flex:none}
  .tabs a:hover{color:var(--chromeink)}
  .tabs a.on{color:var(--chromeink);background:color-mix(in srgb,var(--acc) 16%,transparent);border-color:color-mix(in srgb,var(--acc) 45%,transparent)}
  .tabs a.on .d{background:var(--led);opacity:1;box-shadow:0 0 7px var(--led)}

  .content{max-width:980px;margin:0 auto;padding:14px 26px 90px}

  /* section panel */
  .sec{position:relative;width:max-content;max-width:100%;background:linear-gradient(180deg,var(--surf2),var(--surf));border:1px solid var(--line);
    border-radius:9px;padding:12px 15px 5px;margin:0 0 11px;box-shadow:inset 0 1px 0 rgba(255,255,255,.05),0 2px 8px rgba(0,0,0,.32)}
  .scr{position:absolute;width:6px;height:6px;border-radius:50%;z-index:2;
    background:radial-gradient(circle at 35% 30%,#cccfd3,#6c6f74 68%,#0c0d0e);box-shadow:inset 0 0 0 .5px rgba(0,0,0,.5),0 1px 1px rgba(0,0,0,.4)}
  .scr.tl{top:7px;left:7px}.scr.tr{top:7px;right:7px}.scr.bl{bottom:7px;left:7px}.scr.br{bottom:7px;right:7px}
  .shd{display:flex;align-items:center;gap:9px;margin:0 2px 12px}
  .shd .led{width:6px;height:6px;border-radius:50%;background:var(--led);box-shadow:0 0 7px var(--led);flex:none}
  .shd .no{font-size:9px;font-weight:700;letter-spacing:1.4px;color:var(--mut);font-variant-numeric:tabular-nums}
  .shd h2{margin:0;font-size:12px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--ink);text-shadow:0 1px 1px rgba(0,0,0,.45)}
  .shd .rule{flex:1;height:1px;background:linear-gradient(90deg,var(--line),transparent)}

  .grp{margin:0 0 2px}
  .gcap{font-size:8px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--mut);margin:0 0 9px;display:flex;align-items:center;gap:7px}
  .gcap::before{content:"";width:3px;height:3px;border-radius:50%;background:var(--led);box-shadow:0 0 4px var(--led);opacity:.8;flex:none}
  .gcap::after{content:"";flex:1;height:1px;background:var(--line)}
  .ctls{display:flex;flex-wrap:wrap;gap:14px 12px;align-items:flex-start;margin:0 0 12px}
  .grprow{display:flex;gap:34px;flex-wrap:wrap;align-items:flex-start}
  .grprow .grp{flex:none}
  .lfobox{width:max-content;max-width:100%;border:1px solid var(--line);border-left:3px solid var(--led);border-radius:7px;
    padding:11px 14px 4px;margin:0 0 11px;background:linear-gradient(180deg,rgba(255,255,255,.03),rgba(0,0,0,.07))}
  .lfobox .grp:first-child{margin-bottom:7px}

  /* physical knob */
  .k{display:flex;flex-direction:column;align-items:center;gap:4px;width:56px;flex:none}
  .k .lab{font-size:8.2px;font-weight:600;letter-spacing:.2px;text-transform:uppercase;color:var(--ink);opacity:.9;text-align:center;
    line-height:1.08;height:16px;max-width:66px;display:flex;align-items:flex-end;justify-content:center;text-shadow:0 1px 1px rgba(0,0,0,.4)}
  .k.dim{opacity:.32}
  .ring{width:48px;height:48px}
  .ring svg{width:48px;height:48px;display:block}
  .ktick{stroke:var(--skirt);stroke-width:.9;stroke-linecap:round;fill:none}
  .rt{fill:none;stroke:var(--track);stroke-width:2.4;stroke-linecap:round}
  .rf{fill:none;stroke:var(--acc);stroke-width:2.4;stroke-linecap:round;filter:drop-shadow(0 0 2px color-mix(in srgb,var(--acc) 55%,transparent))}
  .rk{stroke:var(--ptr);stroke-width:2;stroke-linecap:round}
  .rv{font-size:8.8px;font-weight:600;color:var(--val);font-variant-numeric:tabular-nums}

  /* LED readout select */
  .k.sel{width:auto}
  .k.sel .lab{max-width:150px}
  .chip{height:26px;width:104px;display:flex;align-items:center;gap:6px;padding:0 8px;border-radius:6px;border:1px solid var(--wellbd);
    background:linear-gradient(180deg,#0c0e0d,#070908);box-shadow:inset 0 1px 3px rgba(0,0,0,.6),var(--wellring)}
  .chip.wide{width:150px}
  .chip .led{width:4px;height:4px;border-radius:50%;background:var(--led);box-shadow:0 0 5px var(--led);flex:none}
  .chip .cv{flex:1;min-width:0;font-size:10px;font-weight:600;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:.2px}
  .chip .ca{width:0;height:0;border-left:3.5px solid transparent;border-right:3.5px solid transparent;border-top:4px solid var(--mut);flex:none}

  .chip:hover{border-color:var(--acc)}
  .ring{cursor:ns-resize;touch-action:none}
  .selmenu{position:fixed;z-index:200;background:linear-gradient(180deg,var(--surf2),var(--surf));border:1px solid var(--acc);
    border-radius:8px;padding:4px;box-shadow:0 8px 26px rgba(0,0,0,.6);max-height:300px;overflow-y:auto;min-width:120px}
  .selopt{padding:5px 11px;font-size:11px;font-weight:600;color:var(--ink);border-radius:5px;cursor:pointer;white-space:nowrap;letter-spacing:.2px}
  .selopt:hover{background:color-mix(in srgb,var(--acc) 22%,transparent)}
  .selopt.on{background:var(--acc);color:#fff}

  /* hardware button toggle */
  .k.tg{width:auto;align-items:center}
  .tgl{width:30px;height:22px;border-radius:5px;border:1px solid #000;position:relative;

  .scoperow .scope{margin:0}
  .disp svg{width:100%;height:100%;display:block}
  .gline{stroke:rgba(255,255,255,.06);stroke-width:1}

  .amt .v{font-size:9.5px;font-weight:600;color:var(--ink);min-width:24px;text-align:right;font-variant-numeric:tabular-nums}

  /* ---- scopes ---- */

  function dispSvg(W,H){ var d=el("div","disp"); d.style.width=W+"px"; d.style.height=H+"px"; var svg=ns("svg",{viewBox:"0 0 "+W+" "+H,preserveAspectRatio:"none"}); d._svg=svg; d.appendChild(svg); return d; }

  function filterScope(){

    var padX=8;

      else if(type==="HP"){ roll=-10*Math.log(1+Math.pow(1/r,2*poles))/L10; }
      else if(type==="BP"){ var x=r-1/r; roll=-10*Math.log(1+x*x*9)/L10; peak=Math.max(0,(Q-0.7))*0.7*Math.exp(-(lr*lr)/(2*0.2*0.2)); }
      else { var n=1-r*r, q=r/Math.max(0.5,Q); roll=10*Math.log((n*n)/((n*n)+q*q)+1e-4)/L10; peak=0; }
      return roll+peak;
    }
    for(var gx=1;gx<6;gx++){ var GX=padX+(gx/6)*(W-2*padX); svg.appendChild(ns("line",{"class":"gline",x1:GX,y1:top,x2:GX,y2:bot})); }
    svg.appendChild(ns("line",{"class":"gline",x1:padX,y1:ydb(0).toFixed(1),x2:W-padX,y2:ydb(0).toFixed(1)}));
    var pts=[]; for(var i=0;i<=140;i++){ var xN=i/140, r=Math.pow(10,(xN-fcN)*SPAN), db=mag(r);
      db=Math.max(DBMIN,Math.min(DBMAX,db)); pts.push([padX+xN*(W-2*padX), ydb(db)]); }
    var d2=poly(pts);
    var area=d2+" L"+(W-padX)+","+bot+" L"+padX+","+bot+" Z";
    svg.appendChild(ns("path",{"class":"carea",d:area,fill:"var(--acc)",stroke:"none"}));
    svg.appendChild(ns("path",{"class":"curve a",d:d2}));
    var fx=padX+fcN*(W-2*padX);
    svg.appendChild(ns("line",{x1:fx,y1:top,x2:fx,y2:bot,stroke:"var(--acc)","stroke-width":"1","stroke-dasharray":"2 3",opacity:".5"}));
    var leg=el("div","leg");
    var modes=OPTS.opts_filter1_mode;
    var slope=(type==="LP"||type==="HP")?(poles*6)+" dB/oct":(type==="BP"?"band-pass":"notch");
    leg.appendChild(vbig(Math.round(cut),"cutoff"));
    var r1=el("div","lr"); r1.innerHTML='Mode <b>'+modes[mode]+'</b>'; leg.appendChild(r1);
    var r2=el("div","lr"); r2.innerHTML='Reso <b>'+Math.round(reso)+'</b>  ·  <b>'+slope+'</b>'; leg.appendChild(r2);
    var w=el("div","scope"); w.appendChild(disp); w.appendChild(leg); return w;
  }
  function envCell(prefix,cls,label){
    var W=362,H=64,pad=6,top=pad,bot=H-pad, segW=W-2*pad;
    var FA=segW*0.22, FD=segW*0.22, FS=segW*0.20, FR=segW*0.22;
    var col=cls==="a"?"var(--acc)":"var(--acc2)";
    var disp=dispSvg(W,H), svg=disp._svg; grid(svg,W,H,4);
    var area=ns("path",{"class":"carea",fill:col,stroke:"none"}); svg.appendChild(area);
    var line=ns("path",{"class":"curve "+cls,"vector-effect":"non-scaling-stroke"}); svg.appendChild(line);
    function geom(){
      var a=val(prefix+"_attack"),d=val(prefix+"_decay"),s=val(prefix+"_sustain"),st=val(prefix+"_sustain_time"),r=val(prefix+"_release");
      var x0=pad,x1=x0+4+(a/127)*FA,x2=x1+4+(d/127)*FD,x3=x2+6+(st/127)*FS,sy=bot-(s/127)*(bot-top);
      var x4=Math.min(W-pad,x3+4+(r/127)*FR);
      return {x0:x0,x1:x1,x2:x2,x3:x3,x4:x4,sy:sy};
    }
    var handles=[
      {sx:"_attack",f:FA,axis:"x",gx:"x1",gy:function(){return top;}},
      {sx:"_decay",f:FD,axis:"x",gx:"x2",gy:function(g){return g.sy;},sy:"_sustain"},
      {sx:"_sustain_time",f:FS,axis:"x",gx:"x3",gy:function(g){return g.sy;}},
      {sx:"_release",f:FR,axis:"x",gx:"x4",gy:function(){return bot;}}
    ];
    var hEls=handles.map(function(){ var hit=ns("circle",{r:9,fill:"transparent",style:"cursor:grab"});
      var dot=ns("circle",{r:3,fill:col,stroke:"#0a0b0c","stroke-width":"1"}); svg.appendChild(hit); svg.appendChild(dot); return {hit:hit,dot:dot}; });
    function draw(){ var g=geom();
      var pts=[[g.x0,bot],[g.x1,top],[g.x2,g.sy],[g.x3,g.sy],[g.x4,bot]];
      line.setAttribute("d",poly(pts));
      area.setAttribute("d",poly(pts)+" L"+g.x4.toFixed(1)+","+bot+" L"+g.x0+","+bot+" Z");
      handles.forEach(function(h,i){ var cx=g[h.gx], cy=h.gy(g);
        hEls[i].hit.setAttribute("cx",cx); hEls[i].hit.setAttribute("cy",cy);
        hEls[i].dot.setAttribute("cx",cx); hEls[i].dot.setAttribute("cy",cy); });
    }
    draw();
    [prefix+"_attack",prefix+"_decay",prefix+"_sustain",prefix+"_sustain_time",prefix+"_release"].forEach(function(k){ bind(k,draw); });
    handles.forEach(function(h,i){
      hEls[i].hit.addEventListener("pointerdown",function(e){ e.preventDefault(); e.stopPropagation(); closeMenu();
        var sx0=e.clientX, sy0=e.clientY, sA=val(prefix+h.sx), sS=h.sy?val(prefix+h.sy):0;
        try{hEls[i].hit.setPointerCapture(e.pointerId);}catch(_){}
        function mv(ev){ setVal(prefix+h.sx, sA+(ev.clientX-sx0)/h.f*127);
          if(h.sy) setVal(prefix+h.sy, sS-(ev.clientY-sy0)/(bot-top)*127); }
        function up(){ hEls[i].hit.removeEventListener("pointermove",mv); hEls[i].hit.removeEventListener("pointerup",up); }
        hEls[i].hit.addEventListener("pointermove",mv); hEls[i].hit.addEventListener("pointerup",up); });
    });
    var cell=el("div","gcell");
    var gl=el("div","gl"); gl.innerHTML='<i style="background:'+col+'"></i>'+label+'  <em style="font-style:normal;opacity:.55;font-weight:600">drag points</em>'; cell.appendChild(gl);
    cell.appendChild(disp); return cell;
  }
  function envScope(){
    var row=el("div","scoperow between");
    [["amp","a","Amplifier"],["flt","b","Filter"]].forEach(function(c){
      var card=el("div","scope"); card.appendChild(envCell(c[0],c[1],c[2])); row.appendChild(card); });
    return row;
  }

  function amtBar(key){
    var wrap=el("div","amt"),bar=el("div","bar"); bar.appendChild(el("div","mid"));
    var f=el("div","fil"); bar.appendChild(f); var vt=el("div","v");
    function draw(){ var v=val(key),disp=v-64,frac=Math.abs(disp)/63,w=frac*50;
      f.style.left=(disp>=0?"50%":(50-w)+"%"); f.style.width=w+"%"; vt.textContent=(disp>0?"+":"")+disp; }
    draw(); bind(key,draw);
    wrap.appendChild(bar); wrap.appendChild(vt);
    bar.style.cursor="ew-resize"; bar.style.touchAction="none";
    bar.addEventListener("pointerdown",function(e){ e.preventDefault(); closeMenu(); try{bar.setPointerCapture(e.pointerId);}catch(_){}
      function set(ev){ var r=bar.getBoundingClientRect(); var fr=Math.max(0,Math.min(1,(ev.clientX-r.left)/r.width)); setVal(key,Math.round(fr*127)); }
      set(e); function mv(ev){ set(ev); } function up(){ bar.removeEventListener("pointermove",mv); bar.removeEventListener("pointerup",up); }
      bar.addEventListener("pointermove",mv); bar.addEventListener("pointerup",up); });
    return wrap;
  }
  function matrixChip(key){
    var m=PARAMS[key];
    var chip=el("div","chip"); chip.appendChild(el("span","led"));
    var cv=el("span","cv"); chip.appendChild(cv); chip.appendChild(el("span","ca"));
    function draw(){ cv.textContent=optText(m,val(key)); }
    draw(); bind(key,draw);
    chip.addEventListener("click",function(e){ e.stopPropagation(); if(_menu&&_menuOwner===chip){ closeMenu(); return; } openMenu(chip,key,m); });
    return chip;
  }
  function matrixEl(){
    var wrap=el("div","mx"), any=false;
    MATRIX().forEach(function(slot){
      var sm=PARAMS[slot.src]; if((sm.model||0)>state.level) return; any=true;
      var row=el("div","mr"); row.appendChild(el("div","n",String(slot.n)));
      var src=el("div","src"); src.appendChild(matrixChip(slot.src)); row.appendChild(src);
      var flow=el("div","flow");
      slot.pairs.forEach(function(p){
        var dp=el("div","dp"); dp.appendChild(el("span","ar","→"));
        dp.appendChild(matrixChip(p[0]));
        dp.appendChild(amtBar(p[1])); flow.appendChild(dp); });
      row.appendChild(flow); wrap.appendChild(row);
    });
    return any?wrap:null;
  }

  function sectionEl(zone,idx){
    var groups=[], hasMatrix=false;
    if(zone.cards.length===1 && zone.cards[0].matrix){ var mx=matrixEl(); if(!mx) return null; hasMatrix=mx; }
    else {
      zone.cards.forEach(function(cd){
        var ctls=el("div","ctls"), has=false;
        cd.keys.forEach(function(k){ var n=control(k); if(n){ ctls.appendChild(n); has=true; } });
        if(!has) return;
        var g=el("div","grp"); if(cd.t) g.appendChild(el("div","gcap",cd.t)); g.appendChild(ctls); groups.push(g);
      });
      if(!groups.length) return null;
    }
    var sec=el("section","sec"); sec.id="z-"+zone.id;
    ["tl","tr","bl","br"].forEach(function(c){ sec.appendChild(el("span","scr "+c)); });
    var h=el("div","shd"); h.appendChild(el("span","led"));
    h.appendChild(el("span","no",("0"+idx).slice(-2)));
    h.appendChild(el("h2",null,zone.label)); h.appendChild(el("span","rule")); sec.appendChild(h);
    if(zone.scope==="filter") sec.appendChild(liveScope(filterScope,["cutoff","filter1_resonance","filter1_mode"]));
    else if(zone.scope==="env") sec.appendChild(envScope());
    if(hasMatrix){ sec.appendChild(hasMatrix); }
    else if(zone.id==="env" && groups.length>=2){
      var gr=el("div","grprow"); gr.appendChild(groups[0]); gr.appendChild(groups[1]); sec.appendChild(gr);
      for(var gi=2;gi<groups.length;gi++) sec.appendChild(groups[gi]);
    } else if(zone.id==="lfo"){
      for(var li=0;li<groups.length;li+=2){ var box=el("div","lfobox"); box.appendChild(groups[li]); if(groups[li+1]) box.appendChild(groups[li+1]); sec.appendChild(box); }
    } else { groups.forEach(function(g){ sec.appendChild(g); }); }
    return sec;
  }

  /* ---- build / scrollspy / osc-shape dimming ---- */
  function build(){
    var main=document.getElementById("main"), rail=document.getElementById("rail"); if(!main) return;
    main.innerHTML=""; rail.innerHTML=""; zoneEls={}; closeMenu(); var idx=0;
    ZONES().forEach(function(zone){
      idx++; var sec=sectionEl(zone, idx); if(!sec) return;
      main.appendChild(sec); zoneEls[zone.id]=sec;
      var a=el("a"); a.dataset.zone=zone.id; a.appendChild(el("span","d")); a.appendChild(el("span",null,zone.label));
      a.onclick=function(){ var y=sec.getBoundingClientRect().top+window.scrollY-100; window.scrollTo({top:Math.max(0,y),behavior:"smooth"}); };
      rail.appendChild(a);
    });
    onValue("osc1_shape",shapeDim); onValue("osc2_shape",shapeDim);
    shapeDim(); spy(); state.built=true;
  }
  function shapeDim(){ var main=document.getElementById("main"); if(!main) return;
    [1,2].forEach(function(n){ var pulse=val("osc"+n+"_shape")>=64;
      var w=main.querySelector('[data-pk="osc'+n+'_wave_select"]'); var p=main.querySelector('[data-pk="osc'+n+'_pulsewidth"]');
      if(w) w.classList.toggle("dim",pulse); if(p) p.classList.toggle("dim",!pulse); });
  }
  function spy(){
    var items=Object.keys(zoneEls).map(function(id){ return {id:id, el:zoneEls[id]}; });
    function up(){ var line=110, cur=items[0]; if(!cur) return;
      items.forEach(function(it){ if(it.el.getBoundingClientRect().top-line<=1) cur=it; });
      var rail=document.getElementById("rail");
      rail.querySelectorAll("a").forEach(function(a){ a.classList.toggle("on", a.dataset.zone===cur.id); });
    }
    if(_spy) window.removeEventListener("scroll",_spy);
    _spy=up; window.addEventListener("scroll",up,{passive:true}); up();
  }

  /* ---- model skin + rebuild ---- */
  function applyModel(lvl){
    if(lvl==null) lvl=state.level; state.level=lvl;
    var sk=SKINS[lvl], root=document.documentElement;
    ["bg","surf","surf2","line","ink","mut","acc","acc2","led","val","track","skirt","ptr","cap1","cap2","chrome","chromeink","chromemut","cheek1","cheek2","lcdbg","lcdink","lcdframe","gloss","wellbd","wellring"].forEach(function(k){ root.style.setProperty("--"+k, sk[k]); });
    var mn=document.getElementById("mName"); if(mn) mn.textContent=sk.name;
    ["segA","segB","segC"].forEach(function(id,i){ var s=document.getElementById(id); if(s) s.classList.toggle("on", i===lvl); });
    rebuild();
  }
  function rebuild(){ controls={}; state.built=false; build(); seedValues(); refreshBrowser(); }
  function maybeRebuildForModel(name){ var lvl=/^c/i.test(name)?2:/^b/i.test(name)?1:0;
    if(lvl!==state.level || !state.built) applyModel(lvl); }

  /* ---- browser / preset / bank / octave ---- */
  function refreshBrowser(){
    var pn=document.getElementById("pName"); if(pn) pn.textContent=state.values["preset_name"]||"—";
    var pm=document.getElementById("pMeta");
    if(pm){ var bank=state.values["bank_name"]||"", idx=num(state.values["patch_in_bank"]), cnt=num(state.values["preset_count"]);
      var s=bank; if(cnt) s+=(bank?" · ":"")+("00"+idx).slice(-3)+" / "+cnt; pm.textContent=s||"—"; }
    var ov=document.getElementById("oVal"); if(ov){ var o=num(state.values["octave_transpose"]); ov.textContent=(o>0?"+":"")+o; }
  }
  function stepPreset(d){ var i=num(state.values["preset"]), c=num(state.values["preset_count"])||1; i=(i+d+c)%c; setParam("preset",i); state.lastPreset=String(i); refreshBrowser(); patchResync(); }
  function stepOctave(d){ var o=Math.max(-4,Math.min(4,num(state.values["octave_transpose"])+d)); setParam("octave_transpose",o); refreshBrowser(); }

  function applyParamUpdate(params){ if(!params) return; var b=false;
    Object.keys(params).forEach(function(fk){ var key=fk.indexOf(PREFIX)===0?fk.slice(PREFIX.length):fk; pushValue(key,params[fk]);
      if(/^(preset|preset_name|preset_count|patch_in_bank|bank_index|bank_name|octave_transpose|rom_model)$/.test(key)) b=true;
      if(key==="preset"){ var p=String(params[fk]); if(p!==state.lastPreset){ state.lastPreset=p; patchResync(); } }
      if(key==="bank_index"){ var bk=String(params[fk]); if(bk!==state.lastBank){ state.lastBank=bk; patchResync(); } }
      if(key==="rom_model") maybeRebuildForModel(params[fk]); });
    if(b) refreshBrowser();
  }
  function resync(){ try{ window.parent.postMessage({type:"subscribe"},"*"); }catch(e){} if(state.built) seedValues(); }
  function metaResync(){ try{ window.parent.postMessage({type:"subscribe"},"*"); }catch(e){} seedMeta(); }
  function patchResync(){ if(state._rsy) return; state._rsy=1;
    [200,500,1000,1800].forEach(function(ms){ setTimeout(metaResync,ms); });
    setTimeout(function(){ state._rsy=0; },1900); }
  function seedMeta(){
    ["rom_model","preset","preset_name","preset_count","patch_in_bank","bank_index","bank_name","bank_count","octave_transpose"].forEach(function(k){
      remote.getParam(PREFIX+k).then(function(v){ if(v!=null&&v!==""){ if(k==="rom_model")maybeRebuildForModel(v); else state.values[k]=String(v); refreshBrowser(); } }); });
  }
  function seedValues(){
    seedMeta();
    var keys=Object.keys(controls), i=0;
    (function next(){ var n=0; while(i<keys.length&&n<24){ (function(k){ remote.getParam(PREFIX+k).then(function(v){ if(v!=null&&v!=="") pushValue(k,v); }); })(keys[i++]); n++; } if(i<keys.length) setTimeout(next,18); })();
  }

  /* ---- header wiring ---- */
  document.getElementById("segA").onclick=function(){ applyModel(0); };
  document.getElementById("segB").onclick=function(){ applyModel(1); };
  document.getElementById("segC").onclick=function(){ applyModel(2); };
  document.getElementById("pPrev").onclick=function(){ stepPreset(-1); };
  document.getElementById("pNext").onclick=function(){ stepPreset(1); };
  document.getElementById("oDown").onclick=function(){ stepOctave(-1); };
  document.getElementById("oUp").onclick=function(){ stepOctave(1); };
  var syncBtn=document.getElementById("syncBtn"), syncLabel=document.getElementById("syncLabel");
  syncBtn.onclick=function(){ if(syncBtn._busy) return; syncBtn._busy=true;
    syncBtn.classList.add("syncing"); if(syncLabel) syncLabel.textContent="SYNCING"; resync();
    setTimeout(function(){ syncBtn.classList.remove("syncing"); if(syncLabel) syncLabel.textContent="SYNCED"; syncBtn._busy=false;
      setTimeout(function(){ if(syncLabel) syncLabel.textContent="SYNC"; },900); },750); };

  document.addEventListener("pointerdown",function(e){
    if(_menu && !_menu.contains(e.target) && !(e.target.closest&&e.target.closest(".chip"))) closeMenu(); });
  // Page scroll is dismissed by the pointerdown-outside handler above (a touch
  // page-scroll starts with a pointerdown outside the menu). We deliberately do
  // NOT close on the scroll event: a capture-phase scroll listener also fires
  // when scrolling INSIDE the menu's own option list (overflow-y:auto) and when
  // a stray/momentum scroll lands right after reopening — both wrongly dismissed it.

  /* ---- boot: render immediately (default model A), values + real model stream in ---- */
  remote.onParamChange(applyParamUpdate);
  applyModel(0);
  remote.getParam(PREFIX+"rom_model").then(function(v){ maybeRebuildForModel(v||"A"); });
})();
</script>
